<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - Business Permit System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #333;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 24px; color: #1e40af; margin-bottom: 8px; }
    p { color: #64748b; line-height: 1.6; margin-bottom: 16px; }
    .btn {
      display: inline-block;
      background: #1e40af;
      color: white;
      padding: 12px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
    }
    .btn:hover { background: #1d4ed8; }
    .tips { text-align: left; background: #f8fafc; border-radius: 8px; padding: 16px; margin-top: 24px; }
    .tips h3 { font-size: 14px; color: #1e40af; margin-bottom: 8px; }
    .tips ul { font-size: 13px; color: #64748b; padding-left: 20px; }
    .tips li { margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Some features may not be available until you're back online.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
    <div class="tips">
      <h3>While offline, you can:</h3>
      <ul>
        <li>View previously loaded pages from cache</li>
        <li>Check your saved application details</li>
        <li>Review requirements and FAQs</li>
      </ul>
    </div>
  </div>
</body>
</html>
