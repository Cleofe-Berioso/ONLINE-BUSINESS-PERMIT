# OWASP ZAP Security Scan Configuration
# Online Business Permit System
#
# Usage with Docker:
#   docker run -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
#     -t http://localhost:3000 -c tests/security/zap-config.conf
#
# Full scan:
#   docker run -t ghcr.io/zaproxy/zaproxy:stable zap-full-scan.py \
#     -t http://localhost:3000 -c tests/security/zap-config.conf

# ============================================================================
# Scan Configuration
# ============================================================================

# Target URL
env.target=http://localhost:3000

# Context
env.context.name=Business Permit System
env.context.urls=http://localhost:3000

# Include in scope
env.context.include=http://localhost:3000.*

# Exclude from scope (static assets, Next.js internals)
env.context.exclude=.*\._next\/.*
env.context.exclude=.*\.ico$
env.context.exclude=.*\.png$
env.context.exclude=.*\.jpg$
env.context.exclude=.*\.svg$
env.context.exclude=.*\.css$
env.context.exclude=.*\.js\.map$

# ============================================================================
# Scanner Rules Configuration
# ============================================================================

# PASS = scan rule will not fail the test (informational)
# WARN = scan rule will produce a warning
# FAIL = scan rule will fail the test

# Informational findings (don't fail)
10003 = PASS  # Vulnerable JS Library (may flag bundled libs)
10010 = PASS  # Cookie Without Secure Flag (dev mode)
10011 = PASS  # Cookie Without HttpOnly Flag
10015 = PASS  # Re-examine Cache-control Directives

# Warning-level findings
10020 = WARN  # X-Frame-Options Header
10021 = WARN  # X-Content-Type-Options Header
10038 = WARN  # Content Security Policy
10098 = WARN  # Cross-Domain Misconfiguration

# Fail on critical security issues
10016 = FAIL  # Web Browser XSS Protection Not Enabled
10017 = FAIL  # Cross-Domain JavaScript Source File Inclusion
10019 = FAIL  # Content-Type Header Missing
10024 = FAIL  # Information Disclosure - Sensitive Info in URL
10025 = FAIL  # Information Disclosure - Sensitive Info in HTTP Referrer
10027 = FAIL  # Information Disclosure - Suspicious Comments
10032 = FAIL  # Viewstate
10035 = FAIL  # Strict-Transport-Security Header
10036 = FAIL  # Server Leaks Version Info
10037 = FAIL  # Server Leaks Info via X-Powered-By
10040 = FAIL  # Secure Pages Include Mixed Content
10105 = FAIL  # Weak Authentication Method
10202 = FAIL  # Absence of Anti-CSRF Tokens
40003 = FAIL  # CRLF Injection
40012 = FAIL  # Cross Site Scripting (Reflected)
40014 = FAIL  # Cross Site Scripting (Persistent)
40016 = FAIL  # Cross Site Scripting (Persistent) - Prime
40017 = FAIL  # Cross Site Scripting (Persistent) - Spider
40018 = FAIL  # SQL Injection
40019 = FAIL  # SQL Injection - MySQL
